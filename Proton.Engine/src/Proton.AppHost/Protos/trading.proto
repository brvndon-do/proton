syntax = "proto3";

option csharp_namespace = "Proton.Engine.AppHost.Grpc";

package proton.trading;

import "google/protobuf/timestamp.proto";

service Trading {
  rpc CreateOrder (CreateOrderRequest) returns (CreateOrderResponse);
  rpc CancelOrder (CancelOrderRequest) returns (CancelOrderResponse);
}

message CreateOrderRequest {
  TradeOrder order = 1;
}

message CreateOrderResponse {
  OrderResult result = 1;
}

message CancelOrderRequest {
  string order_id = 1;
}

message CancelOrderResponse {
  bool cancelled = 1;
}

message TradeOrder {
  string symbol = 1;
  OrderSide side = 2;
  string quantity = 3;
  OrderType order_type = 4;
  TimeInForce time_in_force = 5;
  string limit_price = 6;
  string stop_price = 7;
  string client_order_id = 8;
}

message OrderResult {
  string order_id = 1;
  OrderStatus status = 2;
  google.protobuf.Timestamp submitted_at = 3;
  string symbol = 4;
  OrderSide side = 5;
  string quantity = 6;
  string filled_quantity = 7;
  string average_fill_price = 8;
  string message = 9;
  repeated string errors = 10;
}

message OrderStatus {
  string order_id = 1;
  OrderState state = 2;
  string filled_quantity = 3;
  string remaining_quantity = 4;
  google.protobuf.Timestamp updated_at = 5;
  string reason = 6;
}

enum OrderSide {
  ORDER_SIDE_UNSPECIFIED = 0;
  ORDER_SIDE_BUY = 1;
  ORDER_SIDE_SELL = 2;
}

enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_MARKET = 1;
  ORDER_TYPE_LIMIT = 2;
  ORDER_TYPE_STOP = 3;
  ORDER_TYPE_STOP_LIMIT = 4;
}

enum TimeInForce {
  TIME_IN_FORCE_UNSPECIFIED = 0;
  TIME_IN_FORCE_DAY = 1;
  TIME_IN_FORCE_GTC = 2;
  TIME_IN_FORCE_IOC = 3;
  TIME_IN_FORCE_FOK = 4;
}

enum OrderState {
  ORDER_STATE_UNSPECIFIED = 0;
  ORDER_STATE_NEW = 1;
  ORDER_STATE_PARTIALLY_FILLED = 2;
  ORDER_STATE_FILLED = 3;
  ORDER_STATE_CANCELLED = 4;
  ORDER_STATE_REJECTED = 5;
}
